name: gameserver-deploy
on:
  workflow_dispatch:

concurrency:
  group: gameserver-deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: self-hosted      # 맥 러너 (Unity 라이선스·docker·git 자격증명 ambient)
    steps:
      - uses: actions/checkout@v4

      - name: sha 산출
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: 의존 UPM 패키지 레포 체크아웃 (file:../../ 형제 위치)
        run: |
          set -e
          cd "$GITHUB_WORKSPACE/.."
          for r in GameFramework LeagueOfPhysical-Shared LeagueOfPhysical-MasterData-Server; do
            if [ -d "$r/.git" ]; then
              git -C "$r" fetch --depth 1 origin && git -C "$r" reset --hard @{u}
            else
              git clone --depth 1 "https://github.com/Baeinsoo/$r" "$r"
            fi
            echo "$r @ $(git -C "$r" rev-parse --short HEAD)"
          done

      - name: NuGet 패키지 복원 (NuGetForUnity CLI, packages.config 기반)
        run: |
          set -e
          dotnet tool restore
          dotnet tool run nugetforunity restore .
          test -f Assets/NuGetForUnity/Packages/AutoMapper.11.0.0/lib/netstandard2.1/AutoMapper.dll

      - name: Unity Linux 서버 빌드 (batchmode)
        run: |
          set -eo pipefail
          UNITY="/Applications/Unity/Hub/Editor/6000.3.16f1/Unity.app/Contents/MacOS/Unity"
          # 전체 로그를 파일로 보존하고 Unity 종료코드를 그대로 전파(삼키지 않음)
          if ! "$UNITY" -batchmode -quit -nographics -projectPath . \
                -executeMethod BuildScript.BuildLinuxServer -logFile - > unity-build.log 2>&1; then
            echo "::error::Unity build failed"; tail -80 unity-build.log; exit 1
          fi
          tail -20 unity-build.log
          test -f GameServer/Build/lop-server.x86_64

      - name: 도커 이미지 빌드·푸시 (amd64)
        working-directory: GameServer
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -e
          # launchd 러너는 맥 keychain에 접근 못 함. docker login 대신 임시 DOCKER_CONFIG에
          # inline auth(base64 user:token)를 직접 써넣어 keychain/credsStore를 완전히 우회.
          export DOCKER_CONFIG="$(mktemp -d)"
          trap 'rm -rf "$DOCKER_CONFIG"' EXIT   # 셀프호스트 맥 — 토큰이 담긴 config를 잡 종료 시 제거
          AUTH="$(printf '%s:%s' "$DOCKERHUB_USERNAME" "$DOCKERHUB_TOKEN" | base64)"
          printf '{"auths":{"https://index.docker.io/v1/":{"auth":"%s"}}}' "$AUTH" > "$DOCKER_CONFIG/config.json"
          IMG="re5nardo/game-server:${{ steps.tag.outputs.sha }}"
          docker build --platform linux/amd64 -t "$IMG" .
          docker push "$IMG"
          echo "pushed $IMG"

      - name: infra game-server-config 태그 bump
        env:
          INFRA_REPO_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
        run: |
          set -e
          TMP="$(mktemp -d)"
          trap 'rm -rf "$TMP"' EXIT   # .git/config에 토큰이 남으므로 잡 종료 시 클론 제거
          # keychain 우회 — 토큰을 URL에 임베드 (GitHub Actions가 로그에서 마스킹)
          git clone --depth 1 "https://x-access-token:${INFRA_REPO_TOKEN}@github.com/Baeinsoo/infrastructure" "$TMP/infra"
          cd "$TMP/infra"
          CM=k8s/apps/backend/game-server-config/configmap.yaml
          # GAME_SERVER_IMAGE 값을 새 sha로 교체 (BSD sed — 맥 러너)
          sed -i '' -E "s|(GAME_SERVER_IMAGE: ).*|\\1re5nardo/game-server:${{ steps.tag.outputs.sha }}|" "$CM"
          if git diff --quiet; then
            echo "변경 없음 (태그 동일)"
          else
            git config user.name "lop-ci"
            git config user.email "ci@lop.local"
            git commit -am "ci(gameserver): bump GAME_SERVER_IMAGE -> ${{ steps.tag.outputs.sha }} [skip ci]"
            git push origin main
          fi
